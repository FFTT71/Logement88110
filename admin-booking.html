<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Réservations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        /* Message Box */
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 15px 25px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab:hover {
            color: #667eea;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        /* Booking Cards */
        .bookings-list {
            display: grid;
            gap: 15px;
        }
        
        .booking-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #667eea;
            transition: all 0.3s;
        }
        
        .booking-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .booking-card.pending {
            border-left-color: #ffc107;
            background: #fffbf0;
        }
        
        .booking-card.confirmed {
            border-left-color: #4caf50;
            background: #f1f8f4;
        }
        
        .booking-card.rejected {
            border-left-color: #f44336;
            background: #fef5f5;
        }
        
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .booking-guest {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .booking-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge.pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge.confirmed {
            background: #d4edda;
            color: #155724;
        }
        
        .badge.rejected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .badge.paid {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .badge.unpaid {
            background: #f8d7da;
            color: #721c24;
        }
        
        .booking-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .detail-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }
        
        .detail-value {
            font-size: 16px;
            color: #333;
        }
        
        .booking-notes {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 3px solid #667eea;
        }
        
        .booking-notes h4 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .booking-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-confirm {
            background: #4caf50;
            color: white;
        }
        
        .btn-confirm:hover {
            background: #45a049;
        }
        
        .btn-reject {
            background: #f44336;
            color: white;
        }
        
        .btn-reject:hover {
            background: #da190b;
        }
        
        .btn-delete {
            background: #9e9e9e;
            color: white;
        }
        
        .btn-delete:hover {
            background: #757575;
        }
        
        .btn-paid {
            background: #2196f3;
            color: white;
        }
        
        .btn-paid:hover {
            background: #0b7dda;
        }
        
        .btn-contact {
            background: #667eea;
            color: white;
        }
        
        .btn-contact:hover {
            background: #5568d3;
        }
        
        /* Block Period Form */
        .block-form {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: 600;
            color: #555;
        }
        
        .form-group input,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* Blocked Periods List */
        .blocked-list {
            display: grid;
            gap: 10px;
        }
        
        .blocked-item {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ffc107;
        }
        
        .blocked-info {
            flex: 1;
        }
        
        .blocked-dates {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .blocked-reason {
            color: #666;
            font-size: 14px;
        }
        
        /* Settings Form */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .settings-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }
        
        .settings-section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .booking-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .booking-actions {
                width: 100%;
            }
            
            .btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Administration des Réservations</h1>
        <p class="subtitle">La maison du Nid Vosgien</p>
        
        <!-- Message Box -->
        <div id="messageBox" class="message"></div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="statPending">0</div>
                <div class="stat-label">En attente</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statConfirmed">0</div>
                <div class="stat-label">Confirmées</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statUpcoming">0</div>
                <div class="stat-label">À venir</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statRevenue">0€</div>
                <div class="stat-label">Revenus confirmés</div>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('bookings')">📋 Réservations</button>
            <button class="tab" onclick="switchTab('blocked')">🚫 Périodes bloquées</button>
            <button class="tab" onclick="switchTab('settings')">⚙️ Paramètres</button>
        </div>
        
        <!-- Tab: Bookings -->
        <div id="tab-bookings" class="tab-content active">
            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>Statut</label>
                    <select id="filterStatus" onchange="filterBookings()">
                        <option value="all">Tous</option>
                        <option value="pending">En attente</option>
                        <option value="confirmed">Confirmées</option>
                        <option value="rejected">Rejetées</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Paiement</label>
                    <select id="filterPayment" onchange="filterBookings()">
                        <option value="all">Tous</option>
                        <option value="paid">Payé</option>
                        <option value="unpaid">Non payé</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Recherche</label>
                    <input type="text" id="searchGuest" placeholder="Nom du client..." oninput="filterBookings()">
                </div>
            </div>
            
            <!-- Bookings List -->
            <div class="bookings-list" id="bookingsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement des réservations...</p>
                </div>
            </div>
        </div>
        
        <!-- Tab: Blocked Periods -->
        <div id="tab-blocked" class="tab-content">
            <div class="block-form">
                <h3 style="color: #667eea; margin-bottom: 20px;">Bloquer une période</h3>
                <form id="blockForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Date de début *</label>
                            <input type="date" id="blockStartDate" required>
                        </div>
                        <div class="form-group">
                            <label>Date de fin *</label>
                            <input type="date" id="blockEndDate" required>
                        </div>
                        <div class="form-group">
                            <label>Raison</label>
                            <input type="text" id="blockReason" placeholder="Ex: Maintenance, vacances...">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-confirm" style="width: 100%;">
                        Bloquer cette période
                    </button>
                </form>
            </div>
            
            <h3 style="margin-bottom: 15px; color: #667eea;">Périodes bloquées</h3>
            <div class="blocked-list" id="blockedList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement...</p>
                </div>
            </div>
        </div>
        
        <!-- Tab: Settings -->
        <div id="tab-settings" class="tab-content">
            <form id="settingsForm">
                <div class="settings-grid">
                    <div class="settings-section">
                        <h3>🏠 Informations de base</h3>
                        <div class="form-group">
                            <label>Nom de l'appartement</label>
                            <input type="text" id="settingApartmentName" value="La maison du Nid Vosgien">
                        </div>
                        <div class="form-group">
                            <label>Email administrateur</label>
                            <input type="email" id="settingAdminEmail" placeholder="votre@email.com">
                        </div>
                    </div>
                    
                    <div class="settings-section">
                        <h3>💰 Tarification</h3>
                        <div class="form-group">
                            <label>Prix par nuit (€)</label>
                            <input type="number" id="settingPricePerNight" value="89" min="0">
                        </div>
                        <div class="form-group">
                            <label>Nombre minimum de nuits</label>
                            <input type="number" id="settingMinNights" value="2" min="1">
                        </div>
                        <div class="form-group">
                            <label>Réduction 7+ nuits (%)</label>
                            <input type="number" id="settingDiscount7" value="10" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label>Réduction 14+ nuits (%)</label>
                            <input type="number" id="settingDiscount14" value="15" min="0" max="100">
                        </div>
                    </div>
                    
                    <div class="settings-section">
                        <h3>🏘️ Capacité</h3>
                        <div class="form-group">
                            <label>Nombre maximum de personnes</label>
                            <input type="number" id="settingMaxGuests" value="4" min="1">
                        </div>
                    </div>
                    
                    <div class="settings-section">
                        <h3>🕐 Horaires</h3>
                        <div class="form-group">
                            <label>Heure d'arrivée</label>
                            <input type="time" id="settingCheckIn" value="15:00">
                        </div>
                        <div class="form-group">
                            <label>Heure de départ</label>
                            <input type="time" id="settingCheckOut" value="11:00">
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-confirm" style="width: 100%; margin-top: 20px; padding: 15px;">
                    Enregistrer les paramètres
                </button>
            </form>
        </div>
    </div>
    
    <script>
        // IHRE GOOGLE APPS SCRIPT URL HIER!
        const API_URL = 'https://script.google.com/macros/s/AKfycbzx8ZZd17DX9rb1kqhXdUZjQD62uH6G0pY-tsPclwRVeMq5j6C2kV9JPaK8rMLZPzuhUw/exec';
        
        let allBookings = [];
        let allBlocked = [];
        let settings = {};
        
        // Initialisierung
        window.addEventListener('DOMContentLoaded', function() {
            initializeApp();
            
            // Set minimum dates
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('blockStartDate').min = today;
            document.getElementById('blockEndDate').min = today;
        });
        
        async function initializeApp() {
            await loadData();
            
            // Auto-refresh alle 30 Sekunden
            setInterval(loadData, 30000);
        }
        
        async function loadData() {
            try {
                await Promise.all([
                    loadBookings(),
                    loadBlocked(),
                    loadSettings()
                ]);
                
                updateStats();
                displayBookings();
                displayBlocked();
                populateSettings();
            } catch (error) {
                console.error('Error loading data:', error);
                showMessage('Erreur de chargement des données', 'error');
            }
        }
        
        async function loadBookings() {
            try {
                const response = await fetch(`${API_URL}?action=getBookings`);
                if (!response.ok) throw new Error('Failed to load bookings');
                allBookings = await response.json();
                console.log('Bookings loaded:', allBookings.length);
            } catch (error) {
                console.error('Error loading bookings:', error);
                allBookings = [];
            }
        }
        
        async function loadBlocked() {
            try {
                const response = await fetch(`${API_URL}?action=getBlocked`);
                if (!response.ok) throw new Error('Failed to load blocked');
                allBlocked = await response.json();
                console.log('Blocked periods loaded:', allBlocked.length);
            } catch (error) {
                console.error('Error loading blocked:', error);
                allBlocked = [];
            }
        }
        
        async function loadSettings() {
            try {
                const response = await fetch(`${API_URL}?action=getSettings`);
                if (!response.ok) throw new Error('Failed to load settings');
                settings = await response.json();
                console.log('Settings loaded:', settings);
            } catch (error) {
                console.error('Error loading settings:', error);
                settings = {};
            }
        }
        
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            
            let pending = 0, confirmed = 0, upcoming = 0, revenue = 0;
            
            allBookings.forEach(booking => {
                if (booking.status === 'pending') pending++;
                if (booking.status === 'confirmed') {
                    confirmed++;
                    revenue += parseFloat(booking.totalPrice) || 0;
                    if (booking.arrivalDate >= today) upcoming++;
                }
            });
            
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statConfirmed').textContent = confirmed;
            document.getElementById('statUpcoming').textContent = upcoming;
            document.getElementById('statRevenue').textContent = revenue.toFixed(0) + '€';
        }
        
        function displayBookings() {
            const list = document.getElementById('bookingsList');
            
            if (!allBookings || allBookings.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <h3>Aucune réservation</h3>
                        <p>Les nouvelles réservations apparaîtront ici</p>
                    </div>
                `;
                return;
            }
            
            let filtered = filterBookingsList();
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <h3>Aucun résultat</h3>
                        <p>Aucune réservation ne correspond aux filtres</p>
                    </div>
                `;
                return;
            }
            
            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            list.innerHTML = filtered.map(booking => `
                <div class="booking-card ${booking.status}">
                    <div class="booking-header">
                        <div class="booking-guest">${booking.guestName}</div>
                        <div class="booking-badges">
                            <span class="badge ${booking.status}">${getStatusText(booking.status)}</span>
                            <span class="badge ${booking.paymentStatus}">${getPaymentText(booking.paymentStatus)}</span>
                        </div>
                    </div>
                    
                    <div class="booking-details">
                        <div class="detail-item">
                            <div class="detail-label">📅 Arrivée</div>
                            <div class="detail-value">${formatDate(booking.arrivalDate)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">📅 Départ</div>
                            <div class="detail-value">${formatDate(booking.departureDate)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🌙 Nuits</div>
                            <div class="detail-value">${booking.numNights}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">👥 Personnes</div>
                            <div class="detail-value">${booking.numGuests}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">💰 Prix total</div>
                            <div class="detail-value">${booking.totalPrice}€</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">📧 Email</div>
                            <div class="detail-value">${booking.email}</div>
                        </div>
                        ${booking.phone ? `
                            <div class="detail-item">
                                <div class="detail-label">📞 Téléphone</div>
                                <div class="detail-value">${booking.phone}</div>
                            </div>
                        ` : ''}
                        <div class="detail-item">
                            <div class="detail-label">🕐 Demande reçue</div>
                            <div class="detail-value">${formatDateTime(booking.createdAt)}</div>
                        </div>
                    </div>
                    
                    ${booking.specialRequests ? `
                        <div class="booking-notes">
                            <h4>💬 Demandes spéciales</h4>
                            <p>${booking.specialRequests}</p>
                        </div>
                    ` : ''}
                    
                    <div class="booking-actions">
                        ${booking.status === 'pending' ? `
                            <button class="btn btn-confirm" onclick="updateBookingStatus('${booking.id}', 'confirmed')">
                                ✓ Confirmer
                            </button>
                            <button class="btn btn-reject" onclick="updateBookingStatus('${booking.id}', 'rejected')">
                                ✗ Rejeter
                            </button>
                        ` : ''}
                        
                        ${booking.status === 'confirmed' ? `
                            <button class="btn btn-paid" onclick="updatePaymentStatus('${booking.id}', '${booking.paymentStatus === 'paid' ? 'unpaid' : 'paid'}')">
                                ${booking.paymentStatus === 'paid' ? '💳 Marquer non payé' : '💳 Marquer payé'}
                            </button>
                        ` : ''}
                        
                        <button class="btn btn-contact" onclick="contactGuest('${booking.email}', '${booking.guestName}')">
                            ✉️ Contacter
                        </button>
                        
                        <button class="btn btn-delete" onclick="deleteBooking('${booking.id}')">
                            🗑️ Supprimer
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function filterBookingsList() {
            const statusFilter = document.getElementById('filterStatus').value;
            const paymentFilter = document.getElementById('filterPayment').value;
            const searchTerm = document.getElementById('searchGuest').value.toLowerCase();
            
            return allBookings.filter(booking => {
                if (statusFilter !== 'all' && booking.status !== statusFilter) return false;
                if (paymentFilter !== 'all' && booking.paymentStatus !== paymentFilter) return false;
                if (searchTerm && !booking.guestName.toLowerCase().includes(searchTerm)) return false;
                return true;
            });
        }
        
        function filterBookings() {
            displayBookings();
        }
        
        async function updateBookingStatus(id, status) {
            if (!confirm(`Êtes-vous sûr de vouloir ${status === 'confirmed' ? 'confirmer' : 'rejeter'} cette réservation ?`)) {
                return;
            }
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateBookingStatus',
                        id: id,
                        status: status
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`Réservation ${status === 'confirmed' ? 'confirmée' : 'rejetée'} avec succès`, 'success');
                    await loadData();
                } else {
                    showMessage('Erreur lors de la mise à jour', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Erreur lors de la mise à jour', 'error');
            }
        }
        
        async function updatePaymentStatus(id, status) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updatePaymentStatus',
                        id: id,
                        paymentStatus: status
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Statut de paiement mis à jour', 'success');
                    await loadData();
                } else {
                    showMessage('Erreur lors de la mise à jour', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Erreur lors de la mise à jour', 'error');
            }
        }
        
        async function deleteBooking(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cette réservation ?')) {
                return;
            }
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'deleteBooking',
                        id: id
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Réservation supprimée', 'success');
                    await loadData();
                } else {
                    showMessage('Erreur lors de la suppression', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Erreur lors de la suppression', 'error');
            }
        }
        
        function contactGuest(email, name) {
            const subject = encodeURIComponent(`Votre réservation - La maison du Nid Vosgien`);
            const body = encodeURIComponent(`Bonjour ${name},\n\n`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
        
        // Blocked Periods
        function displayBlocked() {
            const list = document.getElementById('blockedList');
            
            if (!allBlocked || allBlocked.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">✓</div>
                        <h3>Aucune période bloquée</h3>
                    </div>
                `;
                return;
            }
            
            allBlocked.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
            
            list.innerHTML = allBlocked.map(period => `
                <div class="blocked-item">
                    <div class="blocked-info">
                        <div class="blocked-dates">
                            ${formatDate(period.startDate)} → ${formatDate(period.endDate)}
                        </div>
                        <div class="blocked-reason">${period.reason || 'Période bloquée'}</div>
                    </div>
                    <button class="btn btn-delete" onclick="deleteBlocked('${period.id}')">
                        🗑️ Supprimer
                    </button>
                </div>
            `).join('');
        }
        
        document.getElementById('blockForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const startDate = document.getElementById('blockStartDate').value;
            const endDate = document.getElementById('blockEndDate').value;
            const reason = document.getElementById('blockReason').value;
            
            if (new Date(endDate) <= new Date(startDate)) {
                showMessage('La date de fin doit être après la date de début', 'error');
                return;
            }
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'addBlocked',
                        startDate: startDate,
                        endDate: endDate,
                        reason: reason || 'Période bloquée'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Période bloquée avec succès', 'success');
                    this.reset();
                    await loadData();
                } else {
                    showMessage('Erreur lors du blocage', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Erreur lors du blocage', 'error');
            }
        });
        
        async function deleteBlocked(id) {
            if (!confirm('Êtes-vous sûr de vouloir débloquer cette période ?')) {
                return;
            }
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'deleteBlocked',
                        id: id
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Période débloquée', 'success');
                    await loadData();
                } else {
                    showMessage('Erreur lors du déblocage', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Erreur lors du déblocage', 'error');
            }
        }
        
        // Settings
        function populateSettings() {
            document.getElementById('settingApartmentName').value = settings.apartmentName || '';
            document.getElementById('settingAdminEmail').value = settings.adminEmail || '';
            document.getElementById('settingPricePerNight').value = settings.pricePerNight || 89;
            document.getElementById('settingMinNights').value = settings.minNights || 2;
            document.getElementById('settingDiscount7').value = settings.discount7nights || 10;
            document.getElementById('settingDiscount14').value = settings.discount14nights || 15;
            document.getElementById('settingMaxGuests').value = settings.maxGuests || 4;
            
            // Zeit-Format korrigieren
            let checkIn = settings.checkInTime || '15:00';
            let checkOut = settings.checkOutTime || '11:00';
            
            if (checkIn.includes('1899')) {
                checkIn = '15:00';
            }
            if (checkOut.includes('1899')) {
                checkOut = '11:00';
            }
            
            document.getElementById('settingCheckIn').value = checkIn;
            document.getElementById('settingCheckOut').value = checkOut;
        }
        
        document.getElementById('settingsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newSettings = {
                action: 'updateSettings',
                apartmentName: document.getElementById('settingApartmentName').value,
                adminEmail: document.getElementById('settingAdminEmail').value,
                pricePerNight: document.getElementById('settingPricePerNight').value,
                minNights: document.getElementById('settingMinNights').value,
                discount7nights: document.getElementById('settingDiscount7').value,
                discount14nights: document.getElementById('settingDiscount14').value,
                maxGuests: document.getElementById('settingMaxGuests').value,
                checkInTime: document.getElementById('settingCheckIn').value,
                checkOutTime: document.getElementById('settingCheckOut').value
            };
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(newSettings)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Paramètres enregistrés avec succès', 'success');
                    await loadSettings();
                } else {
                    showMessage('Erreur lors de l\'enregistrement', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Erreur lors de l\'enregistrement', 'error');
            }
        });
        
        // Tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
        }
        
        // Helper functions
        function getStatusText(status) {
            const texts = {
                'pending': 'En attente',
                'confirmed': 'Confirmée',
                'rejected': 'Rejetée'
            };
            return texts[status] || status;
        }
        
        function getPaymentText(status) {
            const texts = {
                'paid': 'Payé',
                'unpaid': 'Non payé'
            };
            return texts[status] || status;
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }
        
        function formatDateTime(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'block';
            
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
